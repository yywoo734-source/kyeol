<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
<title>결 — 지금 이 순간</title>
<meta name="theme-color" content="#12100e" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="결" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icon.svg" />
<link rel="icon" href="icon.svg" />
<style>
  :root{
    --bg:#faf7f2; --surface:#ffffff; --surface-2:#f3eee6; --line:#e6ded1;
    --text:#241f1a; --muted:#8a7f70; --faint:#b6ab99;
    --pain:#d8663d; --pain-soft:#f7e4d9; --pain-ink:#8f3c1c;
    --joy:#3a9d8f; --joy-soft:#dcefe9; --joy-ink:#1f6b60;
    --shadow:0 1px 2px rgba(40,30,20,.04),0 8px 24px rgba(40,30,20,.06);
    --r:16px;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#12100e; --surface:#1c1916; --surface-2:#241f1a; --line:#2f2a24;
      --text:#efe8dd; --muted:#9c9184; --faint:#6b6157;
      --pain:#e77a52; --pain-soft:#33231b; --pain-ink:#f0a583;
      --joy:#4fb3a3; --joy-soft:#16302c; --joy-ink:#84d1c4;
      --shadow:0 1px 2px rgba(0,0,0,.3),0 10px 30px rgba(0,0,0,.35);
    }
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{
    background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;line-height:1.5;
    padding-bottom:calc(72px + env(safe-area-inset-bottom));
  }
  .wrap{max-width:520px;margin:0 auto;padding:0 18px}
  header.top{padding:calc(env(safe-area-inset-top) + 20px) 18px 8px;max-width:520px;margin:0 auto}
  header.top h1{font-size:20px;margin:0;letter-spacing:-.02em;font-weight:700;display:flex;align-items:center;gap:8px}
  header.top .sub{color:var(--muted);font-size:13px;margin-top:2px}
  .dot{width:9px;height:9px;border-radius:50%;background:linear-gradient(135deg,var(--pain),var(--joy))}

  section{display:none;animation:fade .25s ease}
  section.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

  /* HOME */
  .choose{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:22px}
  .choose button{
    border:1px solid var(--line);border-radius:22px;padding:34px 16px;min-height:184px;
    background:var(--surface);box-shadow:var(--shadow);cursor:pointer;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;
    transition:transform .12s ease, box-shadow .12s ease;
  }
  .choose button:active{transform:scale(.97)}
  .choose .em{font-size:44px;line-height:1}
  .choose .lb{font-size:22px;font-weight:700;letter-spacing:-.01em}
  .choose .ds{font-size:12px;color:var(--muted);text-align:center;max-width:15ch}
  .choose .pain{border-color:color-mix(in srgb,var(--pain) 35%,var(--line))}
  .choose .pain .lb{color:var(--pain-ink)}
  .choose .joy{border-color:color-mix(in srgb,var(--joy) 35%,var(--line))}
  .choose .joy .lb{color:var(--joy-ink)}
  .todayline{margin-top:24px;text-align:center;color:var(--muted);font-size:13px}
  .todayline b{color:var(--text);font-weight:600}
  .whisper{margin-top:30px;padding:16px 18px;border-radius:var(--r);background:var(--surface-2);
    color:var(--muted);font-size:13px;line-height:1.6;border:1px solid var(--line)}
  .whisper b{color:var(--text);font-weight:600}
  .incline{margin-top:12px;text-align:center;font-size:13px;color:var(--muted);padding:11px;border-radius:12px;background:var(--surface-2);cursor:pointer}
  .incline b{color:var(--text)}
  .nudge{margin-top:16px;padding:18px 16px;border-radius:var(--r);background:var(--joy-soft);border:1px solid color-mix(in srgb,var(--joy) 30%,var(--line));cursor:pointer;position:relative}
  .nudge .nt{font-weight:700;color:var(--joy-ink);font-size:15px}
  .nudge .ns{color:var(--muted);font-size:12px;margin-top:4px}
  .nudge .nx{position:absolute;top:8px;right:8px;background:none;border:none;color:var(--faint);font-size:11px;cursor:pointer;padding:6px}
  .ihint{display:flex;align-items:center;gap:8px;margin-top:6px;padding:10px 12px;border-radius:12px;background:var(--surface-2);color:var(--muted);font-size:12px}
  .ihint span{flex:1;line-height:1.4}
  .ihint button{background:none;border:none;color:var(--faint);cursor:pointer;font-size:13px;padding:2px 4px;flex:none}

  /* RECORD */
  .rhead{display:flex;align-items:center;gap:10px;margin:18px 0 6px}
  .rhead .badge{font-weight:700;font-size:16px;padding:6px 14px;border-radius:999px}
  .rhead.pain .badge{background:var(--pain-soft);color:var(--pain-ink)}
  .rhead.joy .badge{background:var(--joy-soft);color:var(--joy-ink)}
  .rhead .back{margin-left:auto;background:none;border:none;color:var(--muted);font-size:14px;cursor:pointer;padding:8px}

  .field{margin-top:22px}
  .field > label{display:block;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:10px;letter-spacing:.01em}
  .field .opt{color:var(--faint);font-weight:400}

  /* intensity */
  .intbox{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:18px 16px 14px;box-shadow:var(--shadow)}
  .intnum{font-size:40px;font-weight:800;letter-spacing:-.03em;line-height:1}
  .intzone{font-size:18px;font-weight:700;margin-left:8px}
  .intphrase{color:var(--muted);font-size:14px;margin-top:6px;min-height:20px}
  input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:6px;border-radius:99px;margin:18px 0 4px;background:var(--surface-2)}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:30px;height:30px;border-radius:50%;background:var(--surface);border:2px solid currentColor;box-shadow:0 2px 6px rgba(0,0,0,.18);cursor:pointer}
  .ticks{display:flex;justify-content:space-between;color:var(--faint);font-size:10px;padding:0 2px}
  .pain .intnum,.pain .intzone,.pain input[type=range]{color:var(--pain)}
  .joy  .intnum,.joy .intzone,.joy input[type=range]{color:var(--joy)}
  .pain .intzone{color:var(--pain-ink)} .joy .intzone{color:var(--joy-ink)}

  /* chips */
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{border:1px solid var(--line);background:var(--surface);color:var(--text);
    padding:9px 14px;border-radius:999px;font-size:14px;cursor:pointer;transition:.12s;user-select:none}
  .chip:active{transform:scale(.95)}
  .chip.on{border-color:transparent;font-weight:600}
  .pain .chip.on{background:var(--pain);color:#fff}
  .joy  .chip.on{background:var(--joy);color:#fff}
  .chip.mood{font-size:22px;padding:8px 12px;line-height:1}
  .chip.mood.on{background:var(--surface-2);border-color:currentColor}
  .chip .cnt{font-size:11px;opacity:.55;font-weight:700;margin-left:1px}
  .chip.on .cnt{opacity:.85}
  .addchip{border-style:dashed;color:var(--muted);font-weight:600}

  textarea{width:100%;border:1px solid var(--line);background:var(--surface);color:var(--text);
    border-radius:14px;padding:12px 14px;font:inherit;resize:none;min-height:52px}
  textarea:focus{outline:none;border-color:var(--muted)}

  .seg{display:flex;gap:8px;background:var(--surface-2);padding:4px;border-radius:12px}
  .seg button{flex:1;border:none;background:none;color:var(--muted);padding:9px;border-radius:9px;font:inherit;font-size:13px;cursor:pointer}
  .seg button.on{background:var(--surface);color:var(--text);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.08)}
  .hint{font-size:12px;color:var(--faint);margin-top:8px;line-height:1.5}

  .savebar{position:sticky;bottom:calc(72px + env(safe-area-inset-bottom));margin-top:26px;padding:14px 0 4px;background:linear-gradient(to top,var(--bg) 60%,transparent)}
  .btn{width:100%;border:none;border-radius:16px;padding:16px;font:inherit;font-size:16px;font-weight:700;cursor:pointer;transition:.12s}
  .btn:active{transform:scale(.98)}
  .pain .btn.save{background:var(--pain);color:#fff}
  .joy  .btn.save{background:var(--joy);color:#fff}
  .btn.ghost{background:var(--surface-2);color:var(--muted);font-weight:600;font-size:14px;padding:12px;margin-top:8px}

  /* toast */
  .toast{position:fixed;left:50%;bottom:calc(96px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(20px);
    background:var(--text);color:var(--bg);padding:12px 20px;border-radius:999px;font-size:14px;font-weight:600;
    opacity:0;pointer-events:none;transition:.28s;z-index:50;box-shadow:0 8px 24px rgba(0,0,0,.25)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* REPORT */
  h2.rt{font-size:15px;font-weight:700;margin:26px 0 12px;letter-spacing:-.01em}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px;box-shadow:var(--shadow);margin-bottom:12px}
  .stat{display:flex;align-items:baseline;gap:10px}
  .stat .big{font-size:34px;font-weight:800;letter-spacing:-.02em}
  .stat .unit{color:var(--muted);font-size:14px}
  .stat .goal{margin-left:auto;font-size:12px;color:var(--muted);text-align:right}
  .pill{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px}
  .pill.ok{background:var(--joy-soft);color:var(--joy-ink)}
  .pill.no{background:var(--pain-soft);color:var(--pain-ink)}
  .split{display:flex;gap:8px;margin-top:6px}
  .split .seg2{height:10px;border-radius:99px}
  .barrow{display:flex;align-items:center;gap:10px;margin:9px 0;font-size:13px}
  .barrow .nm{width:38%;flex:none;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .barrow .track{flex:1;height:9px;background:var(--surface-2);border-radius:99px;overflow:hidden}
  .barrow .fill{height:100%;border-radius:99px}
  .barrow.pain .fill{background:var(--pain)} .barrow.joy .fill{background:var(--joy)}
  .barrow .vv{color:var(--muted);font-size:12px;width:44px;text-align:right;flex:none}
  .locked{position:relative;text-align:center;padding:26px 18px;color:var(--muted)}
  .locked .lk{font-size:26px}
  .locked b{color:var(--text)}
  .prog{height:8px;background:var(--surface-2);border-radius:99px;margin:12px auto 0;max-width:220px;overflow:hidden}
  .prog .fill{height:100%;background:var(--joy);border-radius:99px}
  .heat{display:grid;grid-template-columns:auto repeat(4,1fr);gap:5px;font-size:11px}
  .heat .hh{color:var(--faint);text-align:center;padding-bottom:2px}
  .heat .rl{color:var(--muted);display:flex;align-items:center}
  .heat .cell{aspect-ratio:1.6;border-radius:7px;display:flex;align-items:center;justify-content:center;color:var(--text);font-weight:600;background:var(--surface-2)}
  .empty{color:var(--faint);font-size:13px;text-align:center;padding:18px}
  .muted-s{color:var(--muted);font-size:12px;margin-top:2px}

  /* DATA */
  .rowlist{display:flex;flex-direction:column;gap:8px}
  .rec{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:12px 14px;cursor:pointer}
  .rec .ic{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;flex:none;font-size:14px}
  .rec.pain .ic{background:var(--pain-soft);color:var(--pain-ink)}
  .rec.joy .ic{background:var(--joy-soft);color:var(--joy-ink)}
  .rec .meta{flex:1;min-width:0}
  .rec .t1{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .rec .t2{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .rec .flag{font-size:10px;color:var(--faint)}
  .recdel{flex:none;border:none;background:var(--surface-2);color:var(--muted);width:30px;height:30px;border-radius:50%;font-size:13px;cursor:pointer;line-height:1}
  .recdel:active{transform:scale(.9);color:var(--pain-ink)}
  .dbtn{display:flex;gap:10px;margin:8px 0 4px}
  .dbtn button{flex:1;border:1px solid var(--line);background:var(--surface);color:var(--text);border-radius:12px;padding:12px;font:inherit;font-size:13px;font-weight:600;cursor:pointer}
  .danger{color:var(--pain-ink);border-color:color-mix(in srgb,var(--pain) 30%,var(--line))!important}

  /* NAV */
  nav{position:fixed;bottom:0;left:0;right:0;background:color-mix(in srgb,var(--surface) 88%,transparent);
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-top:1px solid var(--line);
    padding-bottom:env(safe-area-inset-bottom);z-index:40}
  nav .inner{max-width:520px;margin:0 auto;display:flex}
  nav button{flex:1;background:none;border:none;color:var(--muted);padding:11px 0 9px;font:inherit;font-size:11px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px}
  nav button .ni{font-size:20px;line-height:1}
  nav button.on{color:var(--text)}
  .sr{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)}
</style>
</head>
<body>

<header class="top">
  <h1><span class="dot"></span> 결 <span style="font-weight:400;color:var(--muted);font-size:14px">지금 이 순간</span></h1>
</header>

<!-- HOME -->
<section id="home" class="active">
  <div class="wrap">
    <div id="installhint"></div>
    <div class="choose">
      <button class="pain" onclick="startRecord('고통')">
        <span class="em">🌑</span><span class="lb">고통</span>
        <span class="ds">지금 나를 붙든 것</span>
      </button>
      <button class="joy" onclick="startRecord('기쁨')">
        <span class="em">☀️</span><span class="lb">기쁨</span>
        <span class="ds">스쳐가는 괜찮은 순간</span>
      </button>
    </div>
    <div class="todayline" id="todayline"></div>
    <div id="incompleteline"></div>
    <div id="eveningnudge"></div>
    <div class="whisper">
      고통은 스스로 기록되기를 요구하지만, <b>스침은 잡아야 남습니다.</b><br>
      1~2점짜리 작은 순간도 기록 대상입니다. 놓친 날은 그냥 비워두세요.
    </div>
  </div>
</section>

<!-- RECORD -->
<section id="record">
  <div class="wrap">
    <div class="rhead" id="rhead">
      <span class="badge" id="rbadge"></span>
      <span class="muted-s" id="rsubtitle"></span>
      <button class="back" onclick="go('home')">✕ 닫기</button>
    </div>

    <div class="field">
      <label>강도 <span class="opt">· 필수</span></label>
      <div class="intbox">
        <div><span class="intnum" id="intnum">5</span><span class="intzone" id="intzone"></span></div>
        <div class="intphrase" id="intphrase"></div>
        <input type="range" min="1" max="10" step="1" value="5" id="intslider" oninput="onSlide()" />
        <div class="ticks"><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span><span>10</span></div>
      </div>
      <div class="hint">그 순간을 채점합니다. 망설여지면 처음 떠오른 숫자로. 나의 과거와만 비교합니다.</div>
    </div>

    <div class="field" id="f-types">
      <label>유형 <span class="opt">· 선택</span></label>
      <div class="chips" id="c-types"></div>
    </div>

    <div class="field">
      <label id="l-aspect">양상 <span class="opt">· 선택</span></label>
      <div class="chips" id="c-aspect"></div>
    </div>

    <div class="field">
      <label>원인 · 맥락 <span class="opt">· 선택</span></label>
      <div class="chips" id="c-cause"></div>
    </div>

    <div class="field" id="f-react">
      <label>내 반응 — 그 순간 실제로 한 행동 <span class="opt">· 선택</span></label>
      <div class="chips" id="c-react"></div>
    </div>

    <div class="field" id="f-keep">
      <label>이 순간을 어떻게 남겼나 <span class="opt">· 선택</span></label>
      <div class="chips" id="c-keep"></div>
    </div>

    <div class="field">
      <label>지금 기분 <span class="opt">· 사건과 별개, 현재 상태</span></label>
      <div class="chips" id="c-mood"></div>
    </div>

    <div class="field">
      <label>한 줄 메모 <span class="opt">· 선택</span></label>
      <textarea id="memo" rows="2" placeholder="필요하면 한 줄만"></textarea>
    </div>

    <div class="field">
      <label>시점</label>
      <div class="seg" id="seg-when">
        <button class="on" data-v="now" onclick="setWhen('now')">지금 일어난 일</button>
        <button data-v="back" onclick="setWhen('back')">아까 · 사후기록</button>
      </div>
      <div class="hint" id="backhint"></div>
      <div id="f-backbucket" style="display:none;margin-top:10px">
        <div class="hint" style="margin:0 0 8px">언제쯤이었나요? <span class="opt">· 시간 패턴 정확도용</span></div>
        <div class="seg" id="seg-bucket">
          <button data-b="새벽" onclick="setBucket('새벽')">새벽</button>
          <button data-b="오전" onclick="setBucket('오전')">오전</button>
          <button data-b="오후" onclick="setBucket('오후')">오후</button>
          <button data-b="밤" onclick="setBucket('밤')">밤</button>
        </div>
      </div>
    </div>

    <div class="savebar">
      <button class="btn save" onclick="saveEvent()">기록 완료</button>
      <button class="btn ghost" onclick="saveEvent(true)">강도만 찍고 나중에 채우기</button>
    </div>
  </div>
</section>

<!-- REPORT -->
<section id="report">
  <div class="wrap" id="reportbody"></div>
</section>

<!-- DATA -->
<section id="data">
  <div class="wrap">
    <h2 class="rt">동기화 · 백업</h2>
    <div class="card" id="cloudbox"></div>

    <h2 class="rt">내보내기</h2>
    <div class="dbtn">
      <button onclick="exportJSON()">JSON 내보내기</button>
      <button onclick="exportCSV()">CSV 내보내기</button>
    </div>
    <div class="hint">데이터는 이 기기 브라우저에만 저장됩니다(로컬 우선). 정기적으로 내보내 백업하세요. 나중에 진짜 앱으로 이관할 때 이 JSON을 씁니다.</div>

    <h2 class="rt">최근 기록 <span class="opt" style="font-weight:400;color:var(--faint)">· 탭하면 수정</span></h2>
    <div class="rowlist" id="recentlist"></div>

    <h2 class="rt">관리</h2>
    <div class="dbtn">
      <button class="danger" onclick="wipe()">전체 삭제</button>
    </div>
  </div>
</section>

<!-- CONNECT -->
<section id="connect">
  <div class="wrap">
    <div class="seg" id="gfilter" style="margin-top:18px">
      <button class="on" data-f="all" onclick="setGraphFilter('all')">전체</button>
      <button data-f="고통" onclick="setGraphFilter('고통')">고통</button>
      <button data-f="기쁨" onclick="setGraphFilter('기쁨')">기쁨</button>
    </div>
    <div id="connectbody"></div>
  </div>
</section>

<div class="toast" id="toast"></div>

<nav>
  <div class="inner">
    <button id="nav-home" class="on" onclick="go('home')"><span class="ni">🖊</span>기록</button>
    <button id="nav-report" onclick="go('report')"><span class="ni">📊</span>리포트</button>
    <button id="nav-connect" onclick="go('connect')"><span class="ni">🕸</span>연결</button>
    <button id="nav-data" onclick="go('data')"><span class="ni">🗄</span>데이터</button>
  </div>
</nav>

<script>
/* ---------- schema / tag sets (P0 키트와 동일) ---------- */
const ANCHORS = {
  고통:[[2,'신호','알아차렸지만 금방 잊었다'],[4,'소음','신경 쓰이지만 하던 일은 계속했다'],

/* 커스텀 태그 저장 */
function loadCustom(){ try{return JSON.parse(localStorage.getItem(CKEY))||{}}catch(e){return{}} }
function getCustom(pol,field){ const c=loadCustom(); return (c[pol]&&c[pol][field])||[]; }
function addCustom(pol,field,tag){
  const c=loadCustom(); c[pol]=c[pol]||{}; c[pol][field]=c[pol][field]||[];
  if(!c[pol][field].includes(tag)){ c[pol][field].push(tag); localStorage.setItem(CKEY,JSON.stringify(c)); }
}
/* 이 극성·필드에서 태그별 사용 횟수 */
function tagCounts(pol,field){
  const arr=FIELD_ARR[field]; const m={};
  active().forEach(e=>{ if(e.polarity!==pol)return; (e[arr]||[]).forEach(t=>m[t]=(m[t]||0)+1); });
  return m;
}
/* 표시할 태그 목록: 프리셋+커스텀+사용됨 합집합, 빈도 desc(자주 쓰는 것 상단) */
function tagPool(field){
  const pol=R.polarity;
  const presets=(TAGS[pol]&&TAGS[pol][field])||[];
  const counts=tagCounts(pol,field);
  const all=[...new Set([...presets, ...getCustom(pol,field), ...Object.keys(counts)])];
  const pidx=t=>{ const i=presets.indexOf(t); return i<0?999:i; };
  all.sort((a,b)=>{ const d=(counts[b]||0)-(counts[a]||0); if(d)return d; const p=pidx(a)-pidx(b); if(p)return p; return a.localeCompare(b); });
  return {list:all, counts};
}
function makeChip(t,sel,count){
  const b=document.createElement('div');
  b.className='chip'+(sel.includes(t)?' on':'');
  b.innerHTML=esc(t)+((count>1)?` <span class="cnt">${count}</span>`:'');
  b.onclick=()=>{ const i=sel.indexOf(t); i>=0?sel.splice(i,1):sel.push(t); b.classList.toggle('on'); };
  return b;
}
function chipset(id,field,sel){
  const el=document.getElementById(id); el.innerHTML='';
  if(field==='types'){ ['신체적','심리적'].forEach(t=>el.appendChild(makeChip(t,sel,0))); return; }
  const {list,counts}=tagPool(field);
  list.forEach(t=>el.appendChild(makeChip(t,sel,counts[t]||0)));
  const add=document.createElement('div');
  add.className='chip addchip'; add.textContent='＋ 추가';
  add.onclick=()=>{
    const t=(prompt('키워드 직접 입력')||'').trim(); if(!t)return;
    addCustom(R.polarity,field,t); if(!sel.includes(t))sel.push(t);
    chipset(id,field,sel);
  };
  el.appendChild(add);
}
function onSlide(){
  const v=+document.getElementById('intslider').value; R.intensity=v;
  const set=ANCHORS[R.polarity]; let a=set[0];
  for(const z of set){ if(v<=z[0]){a=z;break} }
  document.getElementById('intnum').textContent=v;
  document.getElementById('intzone').textContent=a[1];
  document.getElementById('intphrase').textContent=a[2];
}
function setWhen(v){ R.backfilled=(v==='back'); if(!R.backfilled)R.timeBucketManual=null; buildForm(); }
function setBucket(b){ R.timeBucketManual=(R.timeBucketManual===b?null:b); buildForm(); }
function setWhenHint(){
  const h=document.getElementById('backhint');
  if(!R.backfilled){h.textContent='';return}
  h.textContent=R.polarity==='기쁨'
    ? '오늘 지나간 순간을 회수합니다. 사후기록으로 표시됩니다(당일 한정).'
    : '고통 사후기록은 회상이 왜곡되기 쉽습니다. 표시만 남기고 유도하지 않습니다.';
}
function saveEvent(quick){
  const now=new Date();
  R.memo=document.getElementById('memo').value.trim();
  R.ts = R.ts || now.toISOString();
  R.dow = R.dow || DOW[now.getDay()];
  if(R.backfilled && R.timeBucketManual) R.timeBucket = R.timeBucketManual;
  else R.timeBucket = R.timeBucket || bucket(now.getHours());
  R.updatedAt = now.toISOString();
  const edited=R._edit; delete R._edit;
  const arr=load();
  const i=arr.findIndex(x=>x.id===R.id);
  if(i>=0) arr[i]=R; else arr.push(R);
  save(arr);
  toast(edited?'수정됨':(quick?'저장 — 나중에 채우세요':'기록됐습니다'));
  R=null;
  scheduleSync();
  go('home');
}

/* ---------- report ---------- */
function within(arr,days){ const c=Date.now()-days*864e5; return arr.filter(e=>new Date(e.ts).getTime()>=c) }
function tally(items){ const m={}; items.forEach(t=>m[t]=(m[t]||0)+1); return Object.entries(m).sort((a,b)=>b[1]-a[1]) }
function renderReport(){
  const arr=active(); const b=document.getElementById('reportbody');
  if(arr.length<3){ b.innerHTML=`<div class="empty" style="padding:60px 20px">기록이 <b>3건</b> 이상 쌓이면<br>여기 패턴이 나타납니다.<br><br><span style="color:var(--faint)">지금 ${arr.length}건</span></div>`; return }
  const pain=arr.filter(e=>e.polarity==='고통'), joy=arr.filter(e=>e.polarity==='기쁨');
  const wk=within(arr,7).length;
  const joyPct=Math.round(joy.length/arr.length*100);
  // trigger ranking (pain causes)
  const trig=tally(pain.flatMap(e=>e.causes||[])).slice(0,6);
  const trigMax=trig.length?trig[0][1]:1;
  // reaction profile intensity>=7
  const hi=pain.filter(e=>e.intensity>=7);
  const react=tally(hi.flatMap(e=>e.reactions||[])).slice(0,5);
  const reactTot=hi.length;
  // heatmap
  const heat={}; arr.forEach(e=>{const k=e.dow+'|'+e.timeBucket; heat[k]=(heat[k]||0)+1});
  const heatMax=Math.max(1,...Object.values(heat));
  // recovery (locked < 5 joy)
  const recovery=recoveryBlock(arr,joy);

  let h='';
  // weekly
  h+=`<h2 class="rt">기록 가설</h2><div class="card">
    <div class="stat"><span class="big">${wk}</span><span class="unit">건 / 최근 7일</span>
      <span class="goal">목표 ≥5 ${wk>=5?'<span class="pill ok">달성</span>':'<span class="pill no">미달</span>'}</span></div></div>`;
  // polarity
  h+=`<h2 class="rt">고통 · 기쁨 비중</h2><div class="card">
    <div class="stat"><span class="big" style="color:var(--pain-ink)">${pain.length}</span><span class="unit">고통</span>
      <span style="color:var(--faint)">·</span>
      <span class="big" style="color:var(--joy-ink)">${joy.length}</span><span class="unit">기쁨</span>
      <span class="goal">기쁨 ${joyPct}% ${joyPct>=25?'<span class="pill ok">≥25%</span>':'<span class="pill no">&lt;25%</span>'}</span></div>
    <div class="split"><div class="seg2" style="flex:${pain.length||1};background:var(--pain)"></div><div class="seg2" style="flex:${joy.length||1};background:var(--joy)"></div></div>
    </div>`;
  // trigger
  h+=`<h2 class="rt">트리거 랭킹 <span class="opt" style="font-weight:400;color:var(--faint)">· 고통 원인</span></h2><div class="card">`;
  h+= trig.length? trig.map(([n,c])=>bar(n,c,trigMax,'pain')).join('') : `<div class="empty">원인 태그가 아직 없습니다</div>`;
  h+=`</div>`;
  // reaction profile
  h+=`<h2 class="rt">반응 프로파일 <span class="opt" style="font-weight:400;color:var(--faint)">· 강도 7↑</span></h2><div class="card">`;
  if(reactTot>=3 && react.length){
    h+=`<div class="muted-s" style="margin-bottom:10px">강도 7 이상 ${reactTot}건에서 —</div>`;
    h+=react.map(([n,c])=>bar(n+` · ${Math.round(c/reactTot*100)}%`,c,reactTot,'pain')).join('');
  } else h+=`<div class="empty">강도 7 이상 기록이 3건 모이면 열립니다 <span style="color:var(--faint)">(지금 ${reactTot}건)</span></div>`;
  h+=`</div>`;
  // recovery
  h+=`<h2 class="rt">회복 효과 분석</h2>`+recovery;
  // heatmap
  h+=`<h2 class="rt">시간 히트맵 <span class="opt" style="font-weight:400;color:var(--faint)">· 요일 × 시간대</span></h2><div class="card"><div class="heat">`;
  h+=`<div></div>`+BUCKETS.map(x=>`<div class="hh">${x}</div>`).join('');
  DOW.forEach(d=>{ h+=`<div class="rl">${d}</div>`+BUCKETS.map(bk=>{
    const c=heat[d+'|'+bk]||0; const a=c?(.16+.84*c/heatMax):0;
    const bg=c?`color-mix(in srgb, var(--pain) ${Math.round(a*100)}%, var(--surface-2))`:'var(--surface-2)';
    return `<div class="cell" style="background:${bg};color:${a>.5?'#fff':'var(--muted)'}">${c||''}</div>`;
  }).join(''); });
  h+=`</div></div>`;
  // guard note
  h+=`<div class="whisper" style="margin-top:20px">이 리포트는 <b>나의 과거와만</b> 비교합니다. 남과 비교하지 않습니다. 진단·치료 목적이 아닙니다.</div>`;
  b.innerHTML=h;
}
function bar(nm,c,max,cls){
  return `<div class="barrow ${cls}"><span class="nm">${nm}</span><span class="track"><span class="fill" style="width:${Math.round(c/max*100)}%"></span></span><span class="vv">${c}</span></div>`;
}
function recoveryBlock(arr,joy){
  if(joy.length<5){
    const p=Math.round(joy.length/5*100);
    return `<div class="card"><div class="locked"><div class="lk">🔒</div>
      <div style="margin-top:6px"><b>기쁨 기록 5건</b>이 모이면 회복 분석이 열립니다</div>
      <div class="muted-s">기쁨 데이터 없이는 계산 자체가 불가능합니다</div>
      <div class="prog"><div class="fill" style="width:${p}%"></div></div>
      <div class="muted-s" style="margin-top:6px">${joy.length} / 5</div></div></div>`;
  }
  // joy → 다음 고통까지 24h 내 고통 평균강도 vs 전체 고통 평균
  const evs=arr.slice().sort((a,b)=>new Date(a.ts)-new Date(b.ts));
  const pain=arr.filter(e=>e.polarity==='고통');
  const painAvg=pain.length?pain.reduce((s,e)=>s+e.intensity,0)/pain.length:0;
  let after=[];
  evs.forEach((e,i)=>{
    if(e.polarity!=='기쁨')return;
    const t0=new Date(e.ts).getTime();
    for(let j=i+1;j<evs.length;j++){
      const nx=evs[j]; const dt=(new Date(nx.ts).getTime()-t0)/36e5;
      if(dt>24)break;
      if(nx.polarity==='고통'){ after.push(nx.intensity); break; }
    }
  });
  if(!after.length) return `<div class="card"><div class="muted-s">기쁨 이후 24시간 내 고통 기록이 아직 없습니다. 데이터가 더 쌓이면 비교가 나타납니다.</div></div>`;
  const afterAvg=after.reduce((a,b)=>a+b,0)/after.length;
  const diff=(painAvg-afterAvg);
  const better=diff>0.3;
  return `<div class="card">
    <div class="stat"><span class="big" style="color:var(--joy-ink)">${afterAvg.toFixed(1)}</span><span class="unit">기쁨 직후 24h 고통 평균강도</span></div>
    <div class="muted-s" style="margin-top:6px">전체 고통 평균 ${painAvg.toFixed(1)} · ${after.length}건 비교
      ${better?'<span class="pill ok">직후가 더 낮음</span>':(diff<-0.3?'<span class="pill no">직후가 더 높음</span>':'<span class="pill">차이 미미</span>')}</div>
    <div class="muted-s" style="margin-top:8px;color:var(--faint)">표본이 작으면 흔들립니다. 경향으로만 보세요.</div></div>`;
}

function setGraphFilter(f){
  graphFilter=f; graphSel=null;
  document.querySelectorAll('#gfilter button').forEach(b=>b.classList.toggle('on', b.dataset.f===f));
  renderConnect();
}
function graphData(filter){
  const evs=active().filter(e=>filter==='all'||e.polarity===filter);
  const freq={}, pol={}, co={};
  evs.forEach(e=>{
    const tags=[...new Set([...(e.causes||[]),...(e.aspects||[]),...(e.reactions||[]),...(e.keep||[])])].filter(Boolean);
    tags.forEach(t=>{ freq[t]=(freq[t]||0)+1; (pol[t]=pol[t]||{고통:0,기쁨:0})[e.polarity]++; });
    for(let i=0;i<tags.length;i++) for(let j=i+1;j<tags.length;j++){
      const k=[tags[i],tags[j]].sort().join(''); co[k]=(co[k]||0)+1;
    }
  });
  const minNode=evs.length>=20?2:1;
  const names=Object.keys(freq).filter(t=>freq[t]>=minNode).sort((a,b)=>freq[b]-freq[a]).slice(0,26);
  const nset=new Set(names), edges=[];
  for(const k in co){ const p=k.split(''); if(nset.has(p[0])&&nset.has(p[1])) edges.push({a:p[0],b:p[1],w:co[k]}); }
  return { nodes:names.map(t=>({id:t,freq:freq[t],pol:pol[t]})), edges, total:evs.length };
}
function layout(g,W,H){
  const N=g.nodes.length, pos={};
  g.nodes.forEach((n,i)=>{ const a=2*Math.PI*i/N; pos[n.id]={x:W/2+Math.cos(a)*W*0.32,y:H/2+Math.sin(a)*H*0.32,vx:0,vy:0}; });
  const maxW=Math.max(1,...g.edges.map(e=>e.w));
  for(let it=0;it<240;it++){
    for(let i=0;i<N;i++)for(let j=i+1;j<N;j++){
      const A=pos[g.nodes[i].id],B=pos[g.nodes[j].id];
      let dx=A.x-B.x,dy=A.y-B.y,d2=dx*dx+dy*dy||0.01,d=Math.sqrt(d2),rep=2600/d2;
      A.vx+=dx/d*rep;A.vy+=dy/d*rep;B.vx-=dx/d*rep;B.vy-=dy/d*rep;
    }
    g.edges.forEach(e=>{
      const A=pos[e.a],B=pos[e.b];let dx=B.x-A.x,dy=B.y-A.y,d=Math.sqrt(dx*dx+dy*dy)||0.01;
      const f=0.02*(0.5+e.w/maxW)*(d-72);
      A.vx+=dx/d*f;A.vy+=dy/d*f;B.vx-=dx/d*f;B.vy-=dy/d*f;
    });
    g.nodes.forEach(n=>{ const P=pos[n.id];
      P.vx+=(W/2-P.x)*0.003;P.vy+=(H/2-P.y)*0.003;
      P.x+=Math.max(-7,Math.min(7,P.vx));P.y+=Math.max(-7,Math.min(7,P.vy));
      P.vx*=0.86;P.vy*=0.86;
      P.x=Math.max(26,Math.min(W-26,P.x));P.y=Math.max(30,Math.min(H-34,P.y));
    });
  }
  return pos;
}
function nodeColor(n){ const p=n.pol||{고통:0,기쁨:0}; return p.고통>p.기쁨?'var(--pain)':(p.기쁨>p.고통?'var(--joy)':'#9a8f80'); }
function selNode(i){ const n=_g&&_g.nodes[i]; if(!n)return; graphSel=(graphSel===n.id?null:n.id); renderConnect(); }
function renderConnect(){
  const wrap=document.getElementById('connectbody');
  const g=graphData(graphFilter); _g=g;
  if(g.nodes.length<2){
    wrap.innerHTML=`<div class="empty" style="padding:56px 20px">기록이 더 쌓이면<br>키워드들이 <b>맥락으로 이어집니다.</b><br><br><span style="color:var(--faint)">같은 기록에 함께 적은 키워드끼리 연결됩니다</span></div>`;
    return;
  }
  const W=340,H=360;
  const sig=graphFilter+'|'+g.nodes.map(n=>n.id).join(',')+'|'+g.edges.length;
  let pos; if(_layoutSig===sig && _pos){ pos=_pos; } else { pos=layout(g,W,H); _pos=pos; _layoutSig=sig; }
  const idx={}; g.nodes.forEach((n,i)=>idx[n.id]=i);
  const neigh=new Set(); if(graphSel){ g.edges.forEach(e=>{ if(e.a===graphSel)neigh.add(e.b); if(e.b===graphSel)neigh.add(e.a); }); }
  const maxW=Math.max(1,...g.edges.map(e=>e.w));
  // 상단 빈출 키워드 스트립
  const top=g.nodes.slice().sort((a,b)=>b.freq-a.freq).slice(0,10);
  let strip=`<div class="muted-s" style="margin:16px 0 8px">자주 나온 키워드 · 탭하면 연결</div><div class="chips">`
    + top.map(n=>`<div class="chip ${graphSel===n.id?'on':''}" style="${graphSel===n.id?('background:'+nodeColor(n)+';color:#fff;border-color:transparent'):''}" onclick="selNode(${idx[n.id]})">${esc(n.id)} <span class="cnt">${n.freq}</span></div>`).join('')
    + `</div>`;
  // 그래프 SVG
  const edgesSvg=g.edges.map(e=>{
    const A=pos[e.a],B=pos[e.b];
    let op=0.12+0.5*(e.w/maxW); if(graphSel) op=(e.a===graphSel||e.b===graphSel)?0.85:0.04;
    const sw=(graphSel&&(e.a===graphSel||e.b===graphSel))?1.6:(0.6+1.6*e.w/maxW);
    return `<line x1="${A.x.toFixed(1)}" y1="${A.y.toFixed(1)}" x2="${B.x.toFixed(1)}" y2="${B.y.toFixed(1)}" stroke="var(--faint)" stroke-opacity="${op.toFixed(2)}" stroke-width="${sw.toFixed(1)}"/>`;
  }).join('');
  const nodesSvg=g.nodes.map((n,i)=>{
    const P=pos[n.id], r=6+Math.min(15,n.freq*2.2);
    let dim=1; if(graphSel && n.id!==graphSel && !neigh.has(n.id)) dim=0.26;
    const nm=n.id.length>7?n.id.slice(0,6)+'…':n.id, sel=graphSel===n.id;
    return `<g opacity="${dim}" onclick="selNode(${i})" style="cursor:pointer">`
      +`<circle cx="${P.x.toFixed(1)}" cy="${P.y.toFixed(1)}" r="${r.toFixed(1)}" fill="${nodeColor(n)}" ${sel?'stroke="var(--text)" stroke-width="2.5"':''}/>`
      +`<text x="${P.x.toFixed(1)}" y="${(P.y+r+11).toFixed(1)}" text-anchor="middle" font-size="10" fill="var(--text)" font-weight="${sel?700:500}">${esc(nm)}</text></g>`;
  }).join('');
  const svg=`<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block;touch-action:manipulation">${edgesSvg}${nodesSvg}</svg>`;
  // 연결된 키워드(백링크)
  let linked;
  if(graphSel){
    const ns=[]; g.edges.forEach(e=>{ if(e.a===graphSel)ns.push([e.b,e.w]); else if(e.b===graphSel)ns.push([e.a,e.w]); });
    ns.sort((a,b)=>b[1]-a[1]);
    const sn=g.nodes[idx[graphSel]], cls=(sn.pol.기쁨>sn.pol.고통)?'joy':'pain';
    linked=`<div class="card"><div class="stat" style="margin-bottom:8px"><span style="font-weight:700">${esc(graphSel)}</span><span class="goal">${sn.freq}회 기록</span></div>`
      +(ns.length? `<div class="muted-s" style="margin-bottom:8px">자주 함께 나온 키워드</div>`+ns.map(([t,w])=>bar(esc(t),w,ns[0][1],cls)).join('') : `<div class="empty">아직 함께 나온 키워드가 없습니다</div>`)
      +`</div>`;
  } else {
    linked=`<div class="muted-s" style="text-align:center;margin-top:10px">노드를 탭하면 그 키워드와 <b>함께 나온 것들</b>이 보입니다</div>`;
  }
  wrap.innerHTML = strip + `<div class="card" style="padding:6px 6px 2px">${svg}</div>` + linked
    + `<div class="whisper" style="margin-top:16px">같은 기록에 함께 적은 키워드끼리 이어집니다. 선이 굵을수록 자주 함께 나온 것. 덩어리가 보이면 그게 <b>당신의 반복 패턴</b>입니다.</div>`;
}

/* ---------- data ---------- */
function renderData(){
  const arr=active().slice().sort((a,b)=>new Date(b.ts)-new Date(a.ts));
  const el=document.getElementById('recentlist');
  if(!arr.length){ el.innerHTML='<div class="empty">아직 기록이 없습니다</div>'; return }
  el.innerHTML=arr.slice(0,40).map(e=>{
    const d=new Date(e.ts); const isPain=e.polarity==='고통';
    const tags=[...(e.causes||[]),...(e.aspects||[])].slice(0,3).join(' · ');
    const dt=`${d.getMonth()+1}/${d.getDate()} ${e.dow} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    return `<div class="rec ${isPain?'pain':'joy'}" onclick="editRecord('${e.id}')">
      <span class="ic">${e.intensity}</span>
      <span class="meta"><span class="t1">${e.polarity}${e.memo?' — '+esc(e.memo):(tags?' · '+tags:'')}</span>
        <span class="t2">${dt}${e.backfilled?' · 사후':''}</span></span>
      <button class="recdel" onclick="event.stopPropagation();delOne('${e.id}')" aria-label="삭제">✕</button></div>`;
  }).join('');
}
function esc(s){ return (s+'').replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c])) }

function download(name,text,type){
  const blob=new Blob([text],{type}); const u=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=u; a.download=name; a.click(); URL.revokeObjectURL(u);
}
function exportJSON(){ download(`kyeol_${today()}.json`, JSON.stringify(active(),null,2),'application/json'); toast('JSON 저장'); }
function exportCSV(){
  const arr=active(); const cols=['ts','dow','timeBucket','polarity','intensity','types','aspects','causes','reactions','keep','mood','memo','backfilled','source'];
  const esc2=v=>{ if(Array.isArray(v))v=v.join(';'); v=(v==null?'':v)+''; return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v; };
  const rows=[cols.join(',')].concat(arr.map(e=>cols.map(c=>esc2(e[c])).join(',')));
  download(`kyeol_${today()}.csv`, '﻿'+rows.join('\n'),'text/csv'); toast('CSV 저장');
}
function today(){ const d=new Date(); return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}` }
function wipe(){
  if(!confirm('모든 기록을 삭제합니다. 되돌릴 수 없습니다. 내보내기 백업을 먼저 하세요.\n\n삭제할까요?'))return;
  if(!confirm('정말 전체 삭제할까요? 마지막 확인입니다.'))return;
  if(session){
    // 로그인 상태: tombstone으로 표시해 클라우드·다른 기기에도 삭제 전파
    const all=load().map(e=>({...e,deleted:true,updatedAt:nowISO()}));
    save(all); syncNow();
  } else {
    localStorage.removeItem(KEY);
  }
  toast('전체 삭제됨'); renderData(); renderHome();
}
function delOne(id){
  if(!confirm('이 기록을 삭제할까요?'))return;
  const all=load(); const i=all.findIndex(e=>e.id===id);
  if(i<0)return;
  if(session){ all[i]={...all[i],deleted:true,updatedAt:nowISO()}; }
  else { all.splice(i,1); }
  save(all); scheduleSync(); toast('삭제됨'); renderData(); renderHome();
}

/* ---------- cloud sync (Supabase) ---------- */
let _syncTimer=null;
function scheduleSync(){ if(!session)return; clearTimeout(_syncTimer); _syncTimer=setTimeout(syncNow,1200); }

async function initCloud(){
  if(!CLOUD_ENABLED) { renderCloud(); return; }
  try{
    const { createClient } = await import('https://esm.sh/@supabase/supabase-js@2');
    sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY,
      { auth:{ persistSession:true, autoRefreshToken:true, detectSessionInUrl:true } });
    const { data:{ session:s } } = await sb.auth.getSession();
    session = s;
    sb.auth.onAuthStateChange((_e,s2)=>{ session=s2; renderCloud(); if(s2) syncNow(); });
    if(session) syncNow();
  }catch(err){ console.warn('cloud init 실패', err); }
  renderCloud();
}

async function syncNow(){
  if(!sb || !session || syncing || !navigator.onLine) return;
  syncing=true; renderCloud('동기화 중…');
  try{
    const uid=session.user.id;
    const localAll=load();
    if(localAll.length){
      const rows=localAll.map(e=>({ id:e.id, user_id:uid, data:e, updated_at:e.updatedAt||e.ts, deleted:!!e.deleted }));
      const { error } = await sb.from('events').upsert(rows);
      if(error) throw error;
    }
    const { data:remote, error:e2 } = await sb.from('events').select('id,data,updated_at,deleted');
    if(e2) throw e2;
    const byId={}; localAll.forEach(e=>byId[e.id]=e);
    let changed=false;
    (remote||[]).forEach(r=>{
      const rec={ ...(r.data||{}), id:r.id, updatedAt:r.updated_at, deleted:r.deleted };
      const cur=byId[r.id];
      if(!cur || new Date(r.updated_at) > new Date(cur.updatedAt||cur.ts)){ byId[r.id]=rec; changed=true; }
    });
    save(Object.values(byId));
    localStorage.setItem('kyeol_last_sync', nowISO());
    renderCloud();
    if(changed){ renderHome(); if(cur_view==='report')renderReport(); if(cur_view==='connect')renderConnect(); if(cur_view==='data')renderData(); }
  }catch(err){ renderCloud('동기화 실패 — '+(err.message||err)); }
  finally{ syncing=false; }
}

async function cloudSignIn(){
  if(!sb) return;
  const email=(prompt('이메일 주소 입력 — 6자리 로그인 코드를 보냅니다')||'').trim();
  if(!email) return;
  const { error } = await sb.auth.signInWithOtp({ email, options:{ shouldCreateUser:true, emailRedirectTo: location.href.split('#')[0] } });
  if(error){ toast('오류: '+error.message); return; }
  localStorage.setItem('kyeol_pending_email', email);
  toast('메일 확인 → 6자리 코드 입력');
  renderCloud();
}
async function cloudVerify(){
  if(!sb) return;
  const email=localStorage.getItem('kyeol_pending_email');
  if(!email){ renderCloud(); return; }
  const code=((document.getElementById('otpcode')||{}).value||'').replace(/\D/g,'');
  if(code.length<6){ toast('6자리 코드 입력'); return; }
  const { error } = await sb.auth.verifyOtp({ email, token:code, type:'email' });
  if(error){ toast('코드 오류 — 다시 확인'); return; }
  localStorage.removeItem('kyeol_pending_email');
  toast('로그인 완료 · 동기화 켜짐');
  // onAuthStateChange가 renderCloud + syncNow 실행
}
function cloudCancel(){ localStorage.removeItem('kyeol_pending_email'); renderCloud(); }
async function cloudSignOut(){ if(sb){ await sb.auth.signOut(); toast('로그아웃 — 로컬 데이터는 이 기기에 남음'); renderCloud(); } }

function renderCloud(msg){
  const el=document.getElementById('cloudbox'); if(!el) return;
  if(!CLOUD_ENABLED){
    el.innerHTML=`<div class="muted-s">클라우드 동기화 <b style="color:var(--text)">미설정</b>. 지금은 이 기기에만 저장됩니다. 내보내기로 백업하세요.</div>`;
    return;
  }
  if(!session){
    const pending=localStorage.getItem('kyeol_pending_email');
    if(pending){
      el.innerHTML=`<div class="stat" style="margin-bottom:8px"><span style="font-weight:700">코드 입력</span><span class="goal"><span class="pill no">확인 대기</span></span></div>
        <div class="muted-s" style="margin-bottom:10px"><b>${esc(pending)}</b> 로 보낸 <b>6자리 코드</b>를 입력하세요. 메일 안 오면 스팸함 확인.</div>
        <input id="otpcode" inputmode="numeric" autocomplete="one-time-code" maxlength="6" placeholder="6자리"
          style="width:100%;border:1px solid var(--line);background:var(--surface);color:var(--text);border-radius:12px;padding:14px;font:inherit;font-size:22px;letter-spacing:8px;text-align:center;margin-bottom:10px">
        <button class="btn" style="background:var(--joy);color:#fff" onclick="cloudVerify()">코드 확인 · 로그인</button>
        <button class="btn ghost" onclick="cloudCancel()">취소 / 다시 보내기</button>`;
      return;
    }
    el.innerHTML=`<div class="stat" style="margin-bottom:10px"><span style="font-weight:700">클라우드 동기화</span>
      <span class="goal"><span class="pill no">로그아웃</span></span></div>
      <div class="muted-s" style="margin-bottom:12px">로그인하면 기록이 클라우드에 백업되고 다른 기기와 동기화됩니다. 캐시 삭제·폰 교체에도 안전.</div>
      <button class="btn" style="background:var(--joy);color:#fff" onclick="cloudSignIn()">이메일로 로그인</button>`;
    return;
  }
  const last=localStorage.getItem('kyeol_last_sync');
  const lt=last? new Date(last) : null;
  const lts=lt? `${lt.getMonth()+1}/${lt.getDate()} ${String(lt.getHours()).padStart(2,'0')}:${String(lt.getMinutes()).padStart(2,'0')}` : '아직 없음';
  el.innerHTML=`<div class="stat" style="margin-bottom:8px"><span style="font-weight:700">클라우드 동기화</span>
    <span class="goal"><span class="pill ok">${msg?'…':'켜짐'}</span></span></div>
    <div class="muted-s">${esc(session.user.email||'로그인됨')}</div>
    <div class="muted-s" style="margin-top:2px">${msg?esc(msg):('마지막 동기화 '+lts)}</div>
    <div class="dbtn" style="margin-top:12px">
      <button onclick="syncNow()">지금 동기화</button>
      <button onclick="cloudSignOut()">로그아웃</button>
    </div>`;
}

/* ---------- boot ---------- */
if('serviceWorker' in navigator){ window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{})); }
window.addEventListener('online', ()=>{ if(session) syncNow(); });
renderHome();
initCloud();
</script>
